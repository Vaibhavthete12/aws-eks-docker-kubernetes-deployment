apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloud-pizza

spec:
  replicas: 1

  selector:
    matchLabels:
      app: pizza

  template:
    metadata:
      labels:
        app: pizza

    spec:
      containers:
      - name: pizza-container

        image: 233338945618.dkr.ecr.ap-south-1.amazonaws.com/cloud-pizza:latest

        ports:
        - containerPort: 5000